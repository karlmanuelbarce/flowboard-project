services:
  api:
    build: ./api
    ports:
      - "3001:3000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - flowboard-net

  worker:
    build: ./worker
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - flowboard-net

  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - flowboard-net

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    networks:
      - flowboard-net

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    networks:
      - flowboard-net

volumes:
  pgdata:
  redisdata:

networks:
  flowboard-net:
    driver: bridge
